name: Build and Cache (Self-Hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-and-cache
  cancel-in-progress: true

defaults:
  run:
    shell: /bin/sh -euxo pipefail {0}

jobs:
  build-nixos:
    name: NixOS ${{ matrix.host }}
    runs-on: [self-hosted, nixos, x86_64-linux]
    timeout-minutes: 330
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        host:
          - beehive
          - earth
          - hyperion
          - miranda
          - phoebe
          - tethys
          - titan
    steps:
      - name: Configure git authentication
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cachix
        run: |
          echo "PATH=/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH" >> "$GITHUB_ENV"
          export PATH="/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH"
          if command -v cachix >/dev/null 2>&1; then
            echo "CACHIX_CMD=cachix" >> "$GITHUB_ENV"
            cachix --version
          else
            echo "CACHIX_CMD=nix run nixpkgs#cachix --" >> "$GITHUB_ENV"
          fi

      - name: Build and push NixOS configuration
        run: |
          set -euo pipefail
          export PATH="/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH"
          echo "Building and pushing NixOS config: ${{ matrix.host }}"
          nix build --no-link --print-out-paths ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" | $CACHIX_CMD push keanu

  build-home:
    name: Home ${{ matrix.cfg }}
    runs-on: [self-hosted, nixos, x86_64-linux]
    timeout-minutes: 330
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - keanu@beehive
          - keanu@earth
          - keanu@hyperion
          - keanu@miranda
          - keanu@phoebe
          - keanu@tethys
          - keanu@titan
          - kimmy@hyperion
          - keanu@bucaccio
          - keanu@emilyvansant
          - keanu@love-alaya
    steps:
      - name: Configure git authentication
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cachix
        run: |
          echo "PATH=/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH" >> "$GITHUB_ENV"
          export PATH="/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH"
          if command -v cachix >/dev/null 2>&1; then
            echo "CACHIX_CMD=cachix" >> "$GITHUB_ENV"
            cachix --version
          else
            echo "CACHIX_CMD=nix run nixpkgs#cachix --" >> "$GITHUB_ENV"
          fi

      - name: Build and push Home configuration
        run: |
          set -euo pipefail
          export PATH="/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH"
          echo "Building and pushing home config: ${{ matrix.cfg }}"
          nix build --no-link --print-out-paths '.#homeConfigurations."${{ matrix.cfg }}".activationPackage' | $CACHIX_CMD push keanu

  build-packages:
    name: Packages
    runs-on: [self-hosted, nixos, x86_64-linux]
    timeout-minutes: 330
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - name: Configure git authentication
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cachix
        run: |
          echo "PATH=/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH" >> "$GITHUB_ENV"
          export PATH="/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH"
          if command -v cachix >/dev/null 2>&1; then
            echo "CACHIX_CMD=cachix" >> "$GITHUB_ENV"
            cachix --version
          else
            echo "CACHIX_CMD=nix run nixpkgs#cachix --" >> "$GITHUB_ENV"
          fi

      - name: Build and push packages
        run: |
          set -euo pipefail
          export PATH="/run/current-system/sw/bin:/nix/var/nix/profiles/default/bin:/bin:$PATH"
          echo "Building and pushing packages..."
          nix build --no-link --print-out-paths ".#packages.x86_64-linux" | $CACHIX_CMD push keanu

  gc:
    name: Garbage Collect
    runs-on: [self-hosted, nixos, x86_64-linux]
    needs: [build-nixos, build-home, build-packages]
    if: always()
    steps:
      - name: Garbage collect
        run: |
          echo "Running garbage collection..."
          nix-collect-garbage --delete-older-than 7d || true
