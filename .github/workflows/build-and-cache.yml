name: Build and Cache (Self-Hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-and-cache
  cancel-in-progress: true

jobs:
  build-and-cache:
    runs-on: [self-hosted, nixos, x86_64-linux]
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push x86_64-linux NixOS configurations
        run: |
          set -euo pipefail
          for host in beehive earth hyperion miranda phoebe tethys titan; do
            echo "========================================"
            echo "Building and pushing NixOS config: $host"
            echo "========================================"
            nix build --no-link --print-out-paths ".#nixosConfigurations.$host.config.system.build.toplevel" | cachix push keanu
          done

      - name: Build and push x86_64-linux Home configurations
        run: |
          set -euo pipefail
          for cfg in \
            "keanu@beehive" \
            "keanu@earth" \
            "keanu@hyperion" \
            "keanu@miranda" \
            "keanu@phoebe" \
            "keanu@tethys" \
            "keanu@titan" \
            "kimmy@hyperion" \
            "keanu@bucaccio" \
            "keanu@emilyvansant" \
            "keanu@love-alaya"; do
            echo "========================================"
            echo "Building and pushing home config: $cfg"
            echo "========================================"
            nix build --no-link --print-out-paths ".#homeConfigurations.\"$cfg\".activationPackage" | cachix push keanu
          done

      - name: Build and push packages
        run: |
          set -euo pipefail
          echo "Building and pushing packages..."
          nix build --no-link --print-out-paths ".#packages.x86_64-linux" | cachix push keanu

      - name: Garbage collect
        run: |
          echo "Running garbage collection..."
          nix-collect-garbage --delete-older-than 7d || true
