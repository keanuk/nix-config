[backdrop]
blur_intensity = 0.5
enabled = true
tint_intensity = 0.29999999999999999

[bar]
order = [ "default" ]

    [bar.default]
    auto_hide = false
    background_opacity = 0.80000000000000004
    border = "outline"
    border_width = 0.0
    capsule = false
    capsule_fill = "surface_variant"
    capsule_opacity = 1.0
    capsule_radius = 8.0
    capsule_thickness = 0.76000000000000001
    center = [ "clock", "weather" ]
    contact_shadow = false
    enabled = true
    end = [ "volume", "battery", "bluetooth", "network", "notifications", "control-center", "session" ]
    font_family = ""
    font_weight = "regular"
    layer = "top"
    margin_edge = 10
    margin_ends = 180
    padding = 14
    panel_overlap = 1
    position = "top"
    radius = 12
    radius_bottom_left = 12
    radius_bottom_right = 12
    radius_top_left = 12
    radius_top_right = 12
    reserve_space = true
    scale = 1.0
    shadow = true
    smart_auto_hide = true
    start = [ "workspaces" ]
    thickness = 34
    widget_spacing = 6

[calendar]
enabled = true

[desktop_widgets]
enabled = false

[dock]
active_monitor_only = false
active_opacity = 1.0
active_scale = 1.0
auto_hide = false
background_opacity = 0.80000000000000004
cross_axis_padding = 8
enabled = true
icon_size = 48
inactive_opacity = 0.84999999999999998
inactive_scale = 0.84999999999999998
item_spacing = 6
launcher_position = "start"
magnification = true
magnification_scale = 1.3500000000000001
main_axis_padding = 16
margin_edge = 8
margin_ends = 0
pinned = [
    "firefox-devedition",
    "thunderbird",
    "element-desktop",
    "org.squidowl.halloy",
    "org.gnome.Maps",
    "ente-desktop",
    "org.gnome.Nautilus",
    "standard-notes",
    "proton-pass",
    "dev.zed.Zed",
    "com.mitchellh.ghostty"
]
position = "bottom"
radius = 16
radius_bottom_left = 16
radius_bottom_right = 16
radius_top_left = 16
radius_top_right = 16
reserve_space = false
shadow = true
show_instance_count = true
show_running = true
smart_auto_hide = true

[idle]
pre_action_fade_seconds = 2.0

    [idle.behavior.lock]
    command = "noctalia:session lock"
    enabled = true
    timeout = 300

    [idle.behavior.screen-off]
    command = "noctalia:dpms-off"
    enabled = true
    resume_command = "noctalia:dpms-on"
    timeout = 300

    [idle.behavior.suspend]
    command = "noctalia:session lock-and-suspend"
    enabled = true
    timeout = 1800

[keybinds]
cancel = [ "escape" ]
down = [ "down" ]
left = [ "left" ]
right = [ "right" ]
up = [ "up" ]
validate = [ "return", "kp_enter" ]

[location]
auto_locate = true

[lockscreen]
allow_empty_password = false
blur_intensity = 0.5
blurred_desktop = true
enabled = true
tint_intensity = 0.29999999999999999
wallpaper = ""

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 768.0
    cy = 741.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
enabled = true

[osd]
orientation = "horizontal"
position = "top_center"
scale = 1.0

    [osd.kinds]
    bluetooth = true
    brightness = true
    caffeine = true
    dnd = true
    keyboard_layout = true
    lock_keys = true
    power_profile = true
    volume = true
    volume_input = true
    volume_output = true
    wifi = true

[plugins]
enabled = []

[shell]
app_icon_color = "on_surface"
app_icon_colorize = false
avatar_path = "~/Pictures/avatar.png"
clipboard_auto_paste = "auto"
clipboard_confirm_clear_history = true
clipboard_enabled = true
clipboard_history_max_entries = 100
clipboard_image_action_command = ""
date_format = "%A, %x"
font_family = "sans-serif"
lang = "de"
launch_apps_as_systemd_services = true
middle_click_opens_widget_settings = true
niri_overview_type_to_launch_enabled = true
offline_mode = false
password_style = "default"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = false
setup_wizard_enabled = true
shared_gl_context = true
show_location = true
telemetry_enabled = true
time_format = "{:%H:%M}"
ui_scale = 1.0

    [shell.animation]
    enabled = true
    speed = 1.0

    [shell.launcher]
    app_grid = true

    [shell.mpris]
    blacklist = []

    [shell.panel]
    borders = true
    clipboard_placement = "centered"
    control_center_placement = "attached"
    launcher_categories = true
    launcher_compact = false
    launcher_placement = "centered"
    launcher_session_search = false
    launcher_show_icons = true
    launcher_sort_by_usage = true
    open_near_click_clipboard = false
    open_near_click_control_center = false
    open_near_click_launcher = false
    open_near_click_session = false
    open_near_click_wallpaper = false
    session_placement = "attached"
    shadow = true
    transparency_mode = "glass"
    wallpaper_placement = "attached"

    [shell.screen_corners]
    enabled = false
    size = 32

    [shell.screenshot]
    copy_to_clipboard = true
    directory = ""
    filename_pattern = "screenshot_%Y%m%d_%H%M%S"
    freeze_screen = false
    pipe_command = ""
    pipe_to_command = false
    save_to_file = true

    [shell.shadow]
    alpha = 0.55000000000000004
    direction = "down"

[theme]
builtin = "Catppuccin"
mode = "auto"
source = "wallpaper"
wallpaper_scheme = "vibrant"

    [theme.templates]
    builtin_ids = [
        "alacritty",
        "btop",
        "cava",
        "emacs",
        "foot",
        "gtk3",
        "gtk4",
        "ghostty",
        "helix",
        "hyprland",
        "kcolorscheme",
        "kitty",
        "niri",
        "qt",
        "scroll",
        "starship",
        "sway"
    ]
    community_ids = [
        "pear-desktop",
        "zen-browser",
        "neovim",
        "obsidian",
        "vscode",
        "zed",
        "rofi",
        "antigravity",
        "bat",
        "discord",
        "lazygit",
        "obs",
        "opencode",
        "papirus-icons",
        "prismlauncher",
        "steam",
        "telegram",
        "yazi",
        "hyprtoolkit"
    ]

[wallpaper]
directory = "/home/keanu/.config/nix-config/lib/wallpapers"
transition_on_startup = true

    [wallpaper.automation]
    enabled = true

    [wallpaper.default]
    path = "/home/keanu/.config/nix-config/lib/wallpapers/pink-mountains.jpg"

    [wallpaper.last]
    path = "/home/keanu/.config/nix-config/lib/wallpapers/pink-mountains.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/keanu/.config/nix-config/lib/wallpapers/pink-mountains.jpg"
